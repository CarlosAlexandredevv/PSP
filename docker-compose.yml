services:
  postgres:
    image: postgres:16-alpine
    container_name: challenger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenger
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: challenger-app
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/challenger
      PORT: '3001'
      HOST: '0.0.0.0'
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node build/server.js"

volumes:
  postgres_data:
